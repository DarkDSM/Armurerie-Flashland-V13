<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Dashboard | AMMU★NATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #1a1a2e;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: linear-gradient(135deg, #1e3a8a, #152e6e);
            color: white;
            padding: 2rem 1rem;
            transition: all 0.3s;
            z-index: 100;
        }

        .sidebar .logo {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar .logo h2 {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
        }

        .sidebar .logo p {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: rgba(255,255,255,0.8);
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-item.active {
            background: #e31b23;
            color: white;
        }

        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }

        /* Main content */
        .main-content {
            margin-left: 280px;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: white;
            padding: 1rem 2rem;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .header h1 {
            font-size: 1.5rem;
            color: #1e3a8a;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            font-weight: 600;
            color: #1e3a8a;
        }

        .logout-btn {
            background: #e31b23;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            transform: scale(1.05);
            background: #b01018;
        }

        /* Stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .icon {
            font-size: 2rem;
            color: #e31b23;
            margin-bottom: 1rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 800;
            color: #1e3a8a;
        }

        .stat-card .label {
            color: #6b7280;
            margin-top: 0.5rem;
        }

        /* Chart container */
        .chart-container {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .chart-container h3 {
            margin-bottom: 1rem;
            color: #1e3a8a;
        }

        canvas {
            max-height: 300px;
        }

        /* Quick actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .action-btn {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: #1e293b;
            display: block;
        }

        .action-btn:hover {
            border-color: #e31b23;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(227,27,35,0.1);
        }

        .action-btn i {
            font-size: 2rem;
            color: #e31b23;
            margin-bottom: 0.5rem;
        }

        .action-btn span {
            display: block;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
                position: fixed;
                top: 1rem;
                left: 1rem;
                z-index: 101;
                background: #1e3a8a;
                color: white;
                padding: 10px;
                border-radius: 8px;
                cursor: pointer;
            }
        }

        .menu-toggle {
            display: none;
        }
    </style>
</head>
<body>
    <div class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="logo">
            <h2>AMMU★NATION</h2>
            <p>Administration</p>
        </div>
        <div class="nav-item active" data-page="dashboard">
            <i class="fas fa-tachometer-alt"></i>
            <span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="produits">
            <i class="fas fa-gun"></i>
            <span>Gestion des armes</span>
        </div>
        <div class="nav-item" data-page="commandes">
            <i class="fas fa-shopping-cart"></i>
            <span>Commandes</span>
        </div>
        <div class="nav-item" data-page="comptabilite">
            <i class="fas fa-chart-line"></i>
            <span>Comptabilité</span>
        </div>
        <div class="nav-item" data-page="utilisateurs">
            <i class="fas fa-users"></i>
            <span>Utilisateurs</span>
        </div>
        <div class="nav-item" data-page="back">
            <i class="fas fa-arrow-left"></i>
            <span>Retour au site</span>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="header">
            <h1 id="pageTitle">Dashboard</h1>
            <div class="user-info">
                <span id="userName">Chargement...</span>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
            </div>
        </div>

        <div id="pageContent">
            <!-- Dashboard content will be loaded here -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "VOTRE_API_KEY",
            authDomain: "VOTRE_PROJECT.firebaseapp.com",
            projectId: "VOTRE_PROJECT_ID",
            storageBucket: "VOTRE_PROJECT.appspot.com",
            messagingSenderId: "VOTRE_SENDER_ID",
            appId: "VOTRE_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserRole = null;
        let currentUserData = null;

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.background = type === 'success' ? '#00c853' : '#e31b23';
            toast.style.color = 'white';
            toast.style.padding = '12px 20px';
            toast.style.borderRadius = '12px';
            toast.style.zIndex = '1000';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Vérifier l'authentification et les droits
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "../login.html";
                return;
            }

            const userDoc = await getDoc(doc(db, "utilisateurs", user.uid));
            if (!userDoc.exists()) {
                window.location.href = "../login.html";
                return;
            }

            currentUserData = userDoc.data();
            currentUserRole = currentUserData.role;

            const allowedRoles = ["admin", "copatron", "manager", "employe"];
            if (!allowedRoles.includes(currentUserRole)) {
                showToast("Vous n'avez pas accès à cette page", 'error');
                setTimeout(() => { window.location.href = "../index.html"; }, 2000);
                return;
            }

            document.getElementById("userName").innerHTML = `${currentUserData.prenom || ''} ${currentUserData.nom || ''} <span style="background:#e31b23; padding:2px 8px; border-radius:20px; font-size:0.7rem; margin-left:8px;">${currentUserRole.toUpperCase()}</span>`;
            
            // Charger le dashboard
            loadDashboard();
        });

        // Navigation
        document.querySelectorAll(".nav-item").forEach(item => {
            item.addEventListener("click", async () => {
                const page = item.dataset.page;
                document.querySelectorAll(".nav-item").forEach(nav => nav.classList.remove("active"));
                item.classList.add("active");
                
                if (page === "back") {
                    window.location.href = "../index.html";
                    return;
                }
                
                document.getElementById("pageTitle").innerText = item.querySelector("span").innerText;
                
                if (page === "dashboard") await loadDashboard();
                else if (page === "produits") await loadProduits();
                else if (page === "commandes") await loadCommandes();
                else if (page === "comptabilite") await loadComptabilite();
                else if (page === "utilisateurs") await loadUtilisateurs();
            });
        });

        // Dashboard
        async function loadDashboard() {
            const container = document.getElementById("pageContent");
            
            // Récupérer les stats
            const commandesRef = collection(db, "commandes");
            const commandesSnap = await getDocs(commandesRef);
            const commandes = commandesSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const utilisateursRef = collection(db, "utilisateurs");
            const utilisateursSnap = await getDocs(utilisateursRef);
            const utilisateurs = utilisateursSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const produitsRef = collection(db, "produits");
            const produitsSnap = await getDocs(produitsRef);
            const produits = produitsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const totalCA = commandes.reduce((sum, cmd) => sum + (cmd.totalVente || 0), 0);
            const totalBenefice = commandes.reduce((sum, cmd) => sum + (cmd.benefice || 0), 0);
            const commandesEnAttente = commandes.filter(cmd => cmd.statut === "en_attente").length;
            const commandesTerminees = commandes.filter(cmd => cmd.statut === "termine").length;
            
            // Préparer les données du graphique (7 derniers jours)
            const last7Days = [];
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                last7Days.push(date.toLocaleDateString('fr-FR'));
            }
            
            const caParJour = last7Days.map(day => {
                const total = commandes.reduce((sum, cmd) => {
                    const cmdDate = new Date(cmd.dateCommande).toLocaleDateString('fr-FR');
                    return sum + (cmdDate === day ? (cmd.totalVente || 0) : 0);
                }, 0);
                return total;
            });
            
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-euro-sign"></i></div>
                        <div class="value">${totalCA.toLocaleString()} $</div>
                        <div class="label">Chiffre d'affaires total</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-chart-line"></i></div>
                        <div class="value">${totalBenefice.toLocaleString()} $</div>
                        <div class="label">Bénéfice total</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-shopping-cart"></i></div>
                        <div class="value">${commandes.length}</div>
                        <div class="label">Commandes totales</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-users"></i></div>
                        <div class="value">${utilisateurs.length}</div>
                        <div class="label">Utilisateurs inscrits</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-clock"></i></div>
                        <div class="value">${commandesEnAttente}</div>
                        <div class="label">Commandes en attente</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-check-circle"></i></div>
                        <div class="value">${commandesTerminees}</div>
                        <div class="label">Commandes terminées</div>
                    </div>
                </div>
                
                <div class="chart-container">
                    <h3><i class="fas fa-chart-line"></i> Évolution du CA (7 derniers jours)</h3>
                    <canvas id="caChart"></canvas>
                </div>
                
                <div class="quick-actions">
                    <a href="#" class="action-btn" data-page="produits">
                        <i class="fas fa-plus-circle"></i>
                        <span>Ajouter une arme</span>
                    </a>
                    <a href="#" class="action-btn" data-page="commandes">
                        <i class="fas fa-check-double"></i>
                        <span>Valider des commandes</span>
                    </a>
                    <a href="#" class="action-btn" data-page="comptabilite">
                        <i class="fas fa-calculator"></i>
                        <span>Calculatrice salaire</span>
                    </a>
                    <a href="#" class="action-btn" data-page="utilisateurs">
                        <i class="fas fa-user-plus"></i>
                        <span>Gérer les rôles</span>
                    </a>
                </div>
            `;
            
            // Créer le graphique
            const ctx = document.getElementById('caChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last7Days,
                    datasets: [{
                        label: 'Chiffre d\'affaires ($)',
                        data: caParJour,
                        borderColor: '#e31b23',
                        backgroundColor: 'rgba(227, 27, 35, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        }
                    }
                }
            });
            
            // Actions rapides
            document.querySelectorAll(".action-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.preventDefault();
                    const page = btn.dataset.page;
                    const navItem = Array.from(document.querySelectorAll(".nav-item")).find(nav => nav.dataset.page === page);
                    if (navItem) navItem.click();
                });
            });
        }
        
        // Pages à implémenter
        async function loadProduits() {
            const container = document.getElementById("pageContent");
            container.innerHTML = `
                <div style="text-align: center; padding: 3rem;">
                    <i class="fas fa-tools" style="font-size: 3rem; color: #e31b23;"></i>
                    <h2 style="margin-top: 1rem;">Page en construction</h2>
                    <p>La gestion des produits arrive bientôt...</p>
                    <a href="produits.html" style="display: inline-block; margin-top: 1rem; background: #e31b23; color: white; padding: 12px 24px; border-radius: 50px; text-decoration: none;">Accéder à la page complète</a>
                </div>
            `;
        }
        
        async function loadCommandes() {
            const container = document.getElementById("pageContent");
            container.innerHTML = `
                <div style="text-align: center; padding: 3rem;">
                    <i class="fas fa-tools" style="font-size: 3rem; color: #e31b23;"></i>
                    <h2 style="margin-top: 1rem;">Page en construction</h2>
                    <p>La gestion des commandes arrive bientôt...</p>
                    <a href="commandes.html" style="display: inline-block; margin-top: 1rem; background: #e31b23; color: white; padding: 12px 24px; border-radius: 50px; text-decoration: none;">Accéder à la page complète</a>
                </div>
            `;
        }
        
        async function loadComptabilite() {
            const container = document.getElementById("pageContent");
            container.innerHTML = `
                <div style="text-align: center; padding: 3rem;">
                    <i class="fas fa-tools" style="font-size: 3rem; color: #e31b23;"></i>
                    <h2 style="margin-top: 1rem;">Page en construction</h2>
                    <p>La comptabilité arrive bientôt...</p>
                    <a href="comptabilite.html" style="display: inline-block; margin-top: 1rem; background: #e31b23; color: white; padding: 12px 24px; border-radius: 50px; text-decoration: none;">Accéder à la page complète</a>
                </div>
            `;
        }
        
        async function loadUtilisateurs() {
            const container = document.getElementById("pageContent");
            container.innerHTML = `
                <div style="text-align: center; padding: 3rem;">
                    <i class="fas fa-tools" style="font-size: 3rem; color: #e31b23;"></i>
                    <h2 style="margin-top: 1rem;">Page en construction</h2>
                    <p>La gestion des utilisateurs arrive bientôt...</p>
                    <a href="utilisateurs.html" style="display: inline-block; margin-top: 1rem; background: #e31b23; color: white; padding: 12px 24px; border-radius: 50px; text-decoration: none;">Accéder à la page complète</a>
                </div>
            `;
        }
        
        // Menu toggle pour mobile
        document.getElementById("menuToggle")?.addEventListener("click", () => {
            document.getElementById("sidebar").classList.toggle("open");
        });
        
        // Déconnexion
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            await signOut(auth);
            window.location.href = "../index.html";
        });
    </script>
</body>
</html>
