<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARMUERIE | GTA RP - Armurerie Légale</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fc;
            color: #1a1a2e;
            overflow-x: hidden;
        }

        /* Scrollbar discrète */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #e0e0e0;
        }
        ::-webkit-scrollbar-thumb {
            background: #e31b23;
            border-radius: 10px;
        }

        /* Header moderne clair */
        .header {
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .logo h1 {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e31b23, #1e3a8a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .logo p {
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 1px;
        }

        /* Icône AK47 stylée */
        .ak-icon {
            font-size: 3rem;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
            transition: transform 0.2s;
        }
        .ak-icon:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .search-wrapper {
            flex: 1;
            max-width: 400px;
            position: relative;
        }
        .search-wrapper input {
            width: 100%;
            padding: 12px 20px;
            background: #f0f2f5;
            border: 2px solid #e0e4e8;
            border-radius: 40px;
            color: #1a1a2e;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .search-wrapper input:focus {
            outline: none;
            border-color: #e31b23;
            background: white;
            box-shadow: 0 0 0 3px rgba(227,27,35,0.1);
        }
        .search-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #e31b23;
        }

        .cart-icon-header {
            background: #1e3a8a;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            transition: all 0.2s;
            color: white;
            border: none;
        }
        .cart-icon-header:hover {
            background: #e31b23;
            transform: scale(1.02);
        }
        .cart-count {
            background: white;
            color: #e31b23;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .btn-contact-header {
            background: transparent;
            border: 2px solid #1e3a8a;
            color: #1e3a8a;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-contact-header:hover {
            background: #1e3a8a;
            color: white;
        }

        /* Navigation catégories - GROS et VISIBLE */
        .nav-categories {
            margin-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            border-top: 2px solid #eef2f6;
            padding-top: 1.5rem;
        }
        .cat-btn {
            background: white;
            border: 2px solid #1e3a8a;
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            color: #1e3a8a;
        }
        .cat-btn:hover {
            background: #e31b23;
            border-color: #e31b23;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(227,27,35,0.3);
        }
        .cat-btn.active {
            background: #e31b23;
            border-color: #e31b23;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Contenu principal - fond clair */
        .main-content {
            min-height: 80vh;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Hero section accueil */
        .hero {
            background: linear-gradient(135deg, #1e3a8a10, #e31b2310);
            border-radius: 30px;
            padding: 3rem;
            text-align: center;
            margin-bottom: 3rem;
            border: 1px solid #e0e4e8;
        }
        .hero h2 {
            font-size: 2.5rem;
            font-family: 'Orbitron', monospace;
            color: #1e3a8a;
        }
        .hero p {
            color: #4a5568;
            margin-top: 1rem;
            font-size: 1.1rem;
        }

        /* Grille produits */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid #e0e4e8;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .product-card:hover {
            transform: translateY(-6px);
            border-color: #e31b23;
            box-shadow: 0 15px 30px rgba(227,27,35,0.1);
        }
        .product-img {
            width: 100%;
            height: 200px;
            background: #f0f2f5;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: #1e3a8a;
        }
        .product-info {
            padding: 1.2rem;
        }
        .product-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #1a1a2e;
        }
        .product-price {
            color: #e31b23;
            font-size: 1.4rem;
            font-weight: 800;
            margin: 8px 0;
        }
        .add-to-cart {
            background: #1e3a8a;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .add-to-cart:hover {
            background: #e31b23;
        }

        /* Modal description */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 30px;
            max-width: 500px;
            width: 90%;
            padding: 2rem;
            border-top: 8px solid #e31b23;
            text-align: center;
        }
        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #888;
        }

        /* Panier latéral - grand et moderne */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -600px;
            width: 550px;
            height: 100vh;
            background: white;
            border-left: 4px solid #e31b23;
            z-index: 1200;
            transition: 0.3s ease-in-out;
            display: flex;
            flex-direction: column;
            padding: 1.8rem;
            box-shadow: -5px 0 30px rgba(0,0,0,0.15);
        }
        .cart-sidebar.open {
            right: 0;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.6rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid #e31b23;
            color: #1e3a8a;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin: 1rem 0;
        }
        .cart-item {
            background: #f8f9fc;
            margin: 10px 0;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0e4e8;
        }
        .cart-total {
            font-size: 1.6rem;
            font-weight: 800;
            border-top: 2px solid #e0e4e8;
            padding-top: 1rem;
            margin-top: 1rem;
            color: #e31b23;
        }
        .rp-form {
            background: #f8f9fc;
            padding: 1.2rem;
            border-radius: 24px;
            margin: 1rem 0;
        }
        .rp-form h3 {
            color: #1e3a8a;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        .rp-form input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: white;
            border: 1px solid #d0d5dd;
            border-radius: 16px;
            color: #1a1a2e;
        }
        .btn-validate {
            background: #00c853;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            color: white;
        }
        .btn-close-cart {
            background: #e0e4e8;
            color: #1a1a2e;
            margin-top: 10px;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1150;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cart-sidebar { width: 100%; right: -100%; }
            .header-top { flex-direction: column; }
            .hero h2 { font-size: 1.8rem; }
            .cat-btn { padding: 8px 18px; font-size: 0.7rem; }
        }

        .category-title {
            font-size: 2rem;
            margin-bottom: 1.8rem;
            border-left: 6px solid #e31b23;
            padding-left: 20px;
            color: #1e3a8a;
            font-weight: 700;
        }
        .section-title {
            font-size: 1.8rem;
            margin: 2rem 0 1.5rem;
            color: #1e3a8a;
            font-weight: 700;
        }
        .featured {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }
        .remove-item {
            background: #e31b23;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div class="logo">
            <h1>ARMUERIE</h1>
            <p>ARMURERIE LÉGALE · LOS SANTOS</p>
        </div>
        <div class="ak-icon">
            <i class="fas fa-gun"></i>
        </div>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Rechercher une arme...">
            <i class="fas fa-search"></i>
        </div>
        <div class="cart-icon-header" id="cartIcon">
            <i class="fas fa-shopping-cart"></i> Panier <span id="cartCount" class="cart-count">0</span>
        </div>
        <button class="btn-contact-header" id="contactBtn"><i class="fas fa-phone-alt"></i> Contact & RDV</button>
    </div>
    <div class="nav-categories" id="navCategories"></div>
</div>

<div class="main-content" id="mainContent"></div>

<!-- Modale description -->
<div id="descModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2 id="modalTitle" style="color:#1e3a8a;"></h2>
        <p id="modalDesc" style="margin:20px 0; color:#4a5568;"></p>
        <p style="color:#e31b23; font-size:1.8rem; font-weight:800;" id="modalPrice"></p>
    </div>
</div>

<!-- Panier -->
<div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header">
        <span><i class="fas fa-shopping-bag"></i> Mon panier</span>
        <span style="cursor:pointer; font-size:32px" id="closeCartBtn">&times;</span>
    </div>
    <div id="cartItemsList" class="cart-items">Panier vide</div>
    <div class="cart-total">💰 TOTAL : <span id="cartTotalPrice">0</span> $</div>
    <div class="rp-form">
        <h3><i class="fas fa-id-card"></i> Informations client RP</h3>
        <input type="text" id="rpNom" placeholder="Nom RP *">
        <input type="text" id="rpPrenom" placeholder="Prénom RP *">
        <input type="date" id="rpBirth">
        <input type="tel" id="rpPhone" placeholder="Numéro de téléphone *">
    </div>
    <button class="btn-validate" id="validateOrderBtn"><i class="fab fa-discord"></i> Valider la commande → Envoyer</button>
    <button class="btn-validate btn-close-cart" id="closeCartBtn2">Fermer</button>
</div>
<div id="overlay" class="overlay"></div>

<script>
    // ---------- BASE ARMES ----------
    const weaponsDB = {
        "Armes blanches": [
            { name: "Couteau à cran d'arrêt", price: 2500, desc: "Dissimulation facile, rapide à dégainer.", img: "cac-cran-arret.png" },
            { name: "Machette", price: 4000, desc: "Lame redoutable pour le corps à corps.", img: "" },
            { name: "Poing américain", price: 1800, desc: "Coup dévastateur dans la mêlée.", img: "" },
            { name: "Katana", price: 12000, desc: "Lame légendaire, rapidité et précision.", img: "" }
        ],
        "Pistolets et revolvers": [
            { name: "Pétoire", price: 5000, desc: "Ancienne mais fiable.", img: "" },
            { name: "Beretta 9mm", price: 8500, desc: "Précision et cadence.", img: "" },
            { name: "Pistolet Lourd", price: 12500, desc: "Puissance brute.", img: "" },
            { name: "Desert Eagle", price: 22000, desc: "Le classique .50 AE.", img: "" },
            { name: "Pistolet Vintage", price: 7500, desc: "Style rétro.", img: "" }
        ],
        "Mitraillettes": [
            { name: "Pistolet mitrailleur", price: 15000, desc: "Rafale compacte.", img: "" },
            { name: "Mitraillette", price: 18500, desc: "Cadence élevée.", img: "" }
        ],
        "Fusils d'assaut": [
            { name: "Mousquet", price: 9000, desc: "Tir lent mais puissant.", img: "" },
            { name: "Carabine", price: 21000, desc: "Précision moyenne/longue distance.", img: "" },
            { name: "Fusil d'assaut Mk II", price: 35000, desc: "Le nec plus ultra.", img: "" }
        ],
        "Fusils de chasse": [
            { name: "Fusil à pompe", price: 18000, desc: "Ravageur à courte portée.", img: "" },
            { name: "Fusil à double canon", price: 16500, desc: "Deux tirs rapides.", img: "" }
        ]
    };

    let cart = [];
    let currentCategory = null;
    let searchFilter = "";

    // ---------- WEBHOOKS (à modifier) ----------
    const WEBHOOK_COMMANDES = "https://discord.com/api/webhooks/1489306972816801834/Ky48u8Y5_DM6XL7GjslvAoZBYjBwl0ttyleqyCZkCnvprGBpJuaX2JBcMEaV5-FGQhq2";
    const WEBHOOK_RDV = "https://discord.com/api/webhooks/1489308538017943553/pTueMQW8xrLZd9FUdqczCgaoSDe8HEk495yRK41qbI3MIcqjiV9qaNArLmRCXEBTsd4d";

    // ---------- RENDU ----------
    function render() {
        const container = document.getElementById("mainContent");
        if (!currentCategory || currentCategory === "accueil") {
            container.innerHTML = `
                <div class="hero">
                    <h2><i class="fas fa-store"></i> Armurerie Légale</h2>
                    <p>Qualité professionnelle · Permis requis · Service RP 24/7</p>
                    <button class="btn-contact-header" id="heroShopBtn" style="margin-top:20px; background:#1e3a8a; color:white;">Explorer les catégories</button>
                </div>
                <div class="section-title">🔥 Armes les plus populaires</div>
                <div class="featured" id="featuredGrid"></div>
            `;
            const allWeapons = Object.values(weaponsDB).flat();
            const top6 = allWeapons.slice(0, 6);
            const grid = document.getElementById("featuredGrid");
            grid.innerHTML = top6.map(w => `
                <div class="product-card" data-name="${w.name}">
                    <div class="product-img"><i class="fas fa-gun"></i></div>
                    <div class="product-info">
                        <div class="product-name">${w.name}</div>
                        <div class="product-price">${w.price.toLocaleString()} $</div>
                        <button class="add-to-cart" data-name="${w.name}" data-price="${w.price}">+ Ajouter au panier</button>
                    </div>
                </div>
            `).join('');
            attachCartEvents();
            attachCardClickEvents(allWeapons);
            document.getElementById("heroShopBtn")?.addEventListener("click", () => {
                currentCategory = "Armes blanches";
                render();
                highlightCat();
            });
            return;
        }
        const weapons = weaponsDB[currentCategory] || [];
        const filtered = weapons.filter(w => w.name.toLowerCase().includes(searchFilter.toLowerCase()));
        container.innerHTML = `
            <div class="category-title">🔫 ${currentCategory.toUpperCase()}</div>
            <div class="products-grid" id="categoryGrid"></div>
        `;
        const grid = document.getElementById("categoryGrid");
        if(filtered.length === 0) { grid.innerHTML = "<p>Aucune arme trouvée.</p>"; return; }
        grid.innerHTML = filtered.map(w => `
            <div class="product-card" data-name="${w.name}">
                <div class="product-img"><i class="fas fa-gun"></i></div>
                <div class="product-info">
                    <div class="product-name">${w.name}</div>
                    <div class="product-price">${w.price.toLocaleString()} $</div>
                    <button class="add-to-cart" data-name="${w.name}" data-price="${w.price}">+ Ajouter au panier</button>
                </div>
            </div>
        `).join('');
        attachCartEvents();
        attachCardClickEvents(weapons);
    }

    function attachCartEvents() {
        document.querySelectorAll(".add-to-cart").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const name = btn.getAttribute("data-name");
                const price = parseInt(btn.getAttribute("data-price"));
                addToCart({ name, price });
            });
        });
    }

    function attachCardClickEvents(weaponsArray) {
        document.querySelectorAll(".product-card").forEach(card => {
            card.addEventListener("click", (e) => {
                if(e.target.classList.contains("add-to-cart")) return;
                const name = card.getAttribute("data-name");
                const weapon = weaponsArray.find(w => w.name === name);
                if(weapon) showModal(weapon);
            });
        });
    }

    function showModal(weapon) {
        document.getElementById("modalTitle").innerText = weapon.name;
        document.getElementById("modalDesc").innerText = weapon.desc;
        document.getElementById("modalPrice").innerHTML = `${weapon.price.toLocaleString()} $`;
        document.getElementById("descModal").style.display = "flex";
    }

    function addToCart(item) {
        cart.push(item);
        updateCartUI();
    }

    function removeFromCart(idx) {
        cart.splice(idx, 1);
        updateCartUI();
    }

    function updateCartUI() {
        const cartDiv = document.getElementById("cartItemsList");
        const countSpan = document.getElementById("cartCount");
        const totalSpan = document.getElementById("cartTotalPrice");
        if(cart.length === 0) {
            cartDiv.innerHTML = "<p style='text-align:center;'>Votre panier est vide</p>";
            countSpan.innerText = "0";
            totalSpan.innerText = "0";
            return;
        }
        let html = "";
        let total = 0;
        cart.forEach((item, idx) => {
            total += item.price;
            html += `<div class="cart-item">
                        <span><i class="fas fa-gun"></i> ${item.name}</span>
                        <span>${item.price.toLocaleString()} $</span>
                        <button class="remove-item" data-idx="${idx}">✖ Supprimer</button>
                    </div>`;
        });
        cartDiv.innerHTML = html;
        countSpan.innerText = cart.length;
        totalSpan.innerText = total.toLocaleString();
        document.querySelectorAll(".remove-item").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const idx = parseInt(btn.getAttribute("data-idx"));
                removeFromCart(idx);
            });
        });
    }

    async function sendOrder() {
        const nom = document.getElementById("rpNom").value.trim();
        const prenom = document.getElementById("rpPrenom").value.trim();
        const birth = document.getElementById("rpBirth").value;
        const phone = document.getElementById("rpPhone").value.trim();
        if(!nom || !prenom || !phone) { alert("Veuillez remplir Nom, Prénom et Téléphone RP"); return; }
        if(cart.length === 0) { alert("Panier vide"); return; }
        const orderLines = cart.map(i => `${i.name} - ${i.price.toLocaleString()} $`);
        const total = cart.reduce((s,i)=>s+i.price,0);
        const embed = {
            title: "🔫 NOUVELLE COMMANDE - ARMUERIE LÉGALE",
            color: 0x1e3a8a,
            fields: [
                { name: "👤 Client RP", value: `${prenom} ${nom}`, inline: true },
                { name: "📅 Date naissance", value: birth || "Non renseignée", inline: true },
                { name: "📞 Téléphone", value: phone, inline: true },
                { name: "📦 Articles commandés", value: orderLines.join("\n") || "Aucun", inline: false },
                { name: "💰 Montant total", value: `${total.toLocaleString()} $`, inline: true }
            ],
            footer: { text: "Armurerie Légale - À traiter rapidement" }
        };
        try {
            await fetch(WEBHOOK_COMMANDES, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ embeds: [embed], content: "@everyone 🛒 Nouvelle commande !" }) });
            alert("✅ Commande envoyée au Discord !");
            cart = []; updateCartUI();
            closeCart();
        } catch(e) { alert("Erreur d'envoi. Vérifie l'URL du webhook."); }
    }

    async function sendRDV(nom, prenom, phone) {
        const embed = {
            title: "📅 DEMANDE DE RENDEZ-VOUS",
            color: 0xe31b23,
            fields: [
                { name: "Nom", value: nom, inline: true },
                { name: "Prénom", value: prenom, inline: true },
                { name: "Téléphone", value: phone, inline: true }
            ]
        };
        await fetch(WEBHOOK_RDV, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ embeds: [embed], content: "@here Nouvelle demande de RDV !" }) });
        alert("Demande de RDV envoyée !");
    }

    function showContactModal() {
        const modalDiv = document.createElement("div");
        modalDiv.className = "modal";
        modalDiv.style.display = "flex";
        modalDiv.innerHTML = `
            <div class="modal-content">
                <span class="close-modal" style="float:right; cursor:pointer;">&times;</span>
                <h2 style="color:#1e3a8a;"><i class="fas fa-store"></i> Armurerie Légale</h2>
                <p><strong>🕒 Horaires d'ouverture :</strong><br>Lundi - Vendredi : 21h → 00h<br>Samedi : 21h → 02h<br>Dimanche : Fermé</p>
                <hr style="margin:1rem 0;">
                <h3 style="color:#e31b23;">📅 Demande de rendez-vous</h3>
                <input type="text" id="rdvNomModal" placeholder="Nom RP" style="width:100%; margin:8px 0; padding:12px; border-radius:16px; border:1px solid #ccc;"><br>
                <input type="text" id="rdvPrenomModal" placeholder="Prénom RP" style="width:100%; margin:8px 0; padding:12px; border-radius:16px; border:1px solid #ccc;"><br>
                <input type="tel" id="rdvPhoneModal" placeholder="Téléphone RP" style="width:100%; margin:8px 0; padding:12px; border-radius:16px; border:1px solid #ccc;"><br>
                <button id="sendRdvModalBtn" style="background:#e31b23; padding:12px; border:none; border-radius:40px; margin-top:15px; cursor:pointer; color:white; font-weight:bold;">Envoyer la demande</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector(".close-modal").onclick = () => modalDiv.remove();
        modalDiv.querySelector("#sendRdvModalBtn").onclick = async () => {
            const n = document.getElementById("rdvNomModal").value.trim();
            const p = document.getElementById("rdvPrenomModal").value.trim();
            const t = document.getElementById("rdvPhoneModal").value.trim();
            if(!n || !p || !t) return alert("Veuillez remplir tous les champs");
            await sendRDV(n, p, t);
            modalDiv.remove();
        };
    }

    function buildNav() {
        const nav = document.getElementById("navCategories");
        const cats = ["Accueil", ...Object.keys(weaponsDB)];
        nav.innerHTML = cats.map(cat => `<button class="cat-btn" data-cat="${cat}">${cat.toUpperCase()}</button>`).join('');
        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const cat = btn.getAttribute("data-cat");
                if(cat === "Accueil") currentCategory = null;
                else currentCategory = cat;
                searchFilter = "";
                document.getElementById("searchInput").value = "";
                render();
                highlightCat();
            });
        });
    }

    function highlightCat() {
        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.classList.remove("active");
            let catVal = btn.getAttribute("data-cat");
            if(catVal === "Accueil" && !currentCategory) btn.classList.add("active");
            else if(currentCategory === catVal) btn.classList.add("active");
        });
    }

    function closeCart() {
        document.getElementById("cartSidebar").classList.remove("open");
        document.getElementById("overlay").style.display = "none";
    }

    // Event listeners
    document.getElementById("searchInput").addEventListener("input", (e) => {
        searchFilter = e.target.value;
        render();
    });
    document.getElementById("cartIcon").addEventListener("click", () => {
        document.getElementById("cartSidebar").classList.add("open");
        document.getElementById("overlay").style.display = "block";
    });
    document.getElementById("closeCartBtn")?.addEventListener("click", closeCart);
    document.getElementById("closeCartBtn2")?.addEventListener("click", closeCart);
    document.getElementById("overlay")?.addEventListener("click", closeCart);
    document.getElementById("validateOrderBtn")?.addEventListener("click", sendOrder);
    document.getElementById("contactBtn")?.addEventListener("click", showContactModal);
    document.querySelector(".close-modal")?.addEventListener("click", () => document.getElementById("descModal").style.display = "none");
    window.onclick = (e) => { if(e.target === document.getElementById("descModal")) document.getElementById("descModal").style.display = "none"; };

    buildNav();
    currentCategory = null;
    render();
</script>
</body>
</html>
